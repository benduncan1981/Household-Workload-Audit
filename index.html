<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Household Workload Audit (Weighted)</title>

  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --primary: #007aff;
      --primary-soft: #e5f0ff;
      --border: #e0e0e5;
      --danger: #ff3b30;
      --success: #34c759;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      justify-content: center;
      align-items: stretch;
    }
    .app {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .header { text-align: center; padding: 4px 0 0; }
    .header h1 { font-size: 20px; margin: 0; font-weight: 700; }
    .header p { margin: 4px 0 0; font-size: 13px; color: var(--muted); }
    .progress-container {
      margin-top: 8px; width: 100%; background: #e5e5ea;
      border-radius: 999px; overflow: hidden; height: 8px;
    }
    .progress-bar {
      height: 100%; width: 0%; background: var(--primary);
      transition: width 0.25s ease-out;
    }
    .card {
      background: var(--card-bg); border-radius: 18px;
      padding: 18px 16px 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      display: flex; flex-direction: column; gap: 16px; flex: 1;
    }
    .category { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; }
    .question { font-size: 18px; font-weight: 600; margin-top: 2px; }
    .description { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .counter { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .btn {
      border-radius: 12px; border: 1px solid var(--border);
      padding: 12px 14px; font-size: 16px; font-weight: 600;
      text-align: center; cursor: pointer; background: #f9f9fb;
      transition: background 0.15s ease, transform 0.05s ease, box-shadow 0.1s ease;
      user-select: none;
    }
    .btn:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .btn-primary { background: var(--primary); color: #ffffff; border-color: var(--primary); }
    .btn-secondary { background: var(--primary-soft); color: var(--primary); border-color: var(--primary-soft); }
    .btn-outline { background: #f9f9fb; color: var(--text); }
    .footer { font-size: 11px; color: var(--muted); text-align: center; margin-top: 4px; }
    .results { display: none; flex-direction: column; gap: 12px; }
    .results h2 { margin: 0; font-size: 18px; }
    .results-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-top: 4px;
    }
    .result-card {
      border-radius: 12px; padding: 10px 8px; background: #f5f5f7;
      text-align: center; font-size: 13px;
    }
    .result-label { font-weight: 600; margin-bottom: 4px; }
    .result-value { font-size: 18px; font-weight: 700; }
    .result-note { font-size: 12px; color: var(--muted); margin-top: 4px; white-space: pre-wrap; }
    .conclusion { font-size: 14px; margin-top: 4px; white-space: pre-wrap; }
    .tag {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 4px;
    }
    .tag-good { background: rgba(52,199,89,0.12); color: var(--success); }
    .tag-warning { background: rgba(255,149,0,0.12); color: #ff9500; }
    .tag-bad { background: rgba(255,59,48,0.12); color: var(--danger); }
    .restart { margin-top: 8px; }
  </style>
</head>
